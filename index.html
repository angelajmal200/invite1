<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ajmal & Bride | Kerala Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="parallax-stage" id="stage">
      <div class="sticky-scene">
        <div class="background-glow"></div>

        <img class="layer temple" src="assets/temple.png" alt="Kerala temple gopuram" />
        <img class="layer leaves leaves-left" src="assets/banana-leaves.png" alt="Banana leaves left" />
        <img class="layer leaves leaves-right" src="assets/banana-leaves.png" alt="Banana leaves right" />
        <img class="layer garlands" src="assets/jasmine-garlands.png" alt="Jasmine garlands" />
        <img class="layer lamps lamps-left" src="assets/brass-lamps.png" alt="Brass hanging lamps" />
        <img class="layer lamps lamps-right" src="assets/brass-lamps.png" alt="Brass hanging lamps" />
        <img class="layer lotus lotus-left" src="assets/lotus-flowers.png" alt="Pink lotus flowers" />
        <img class="layer lotus lotus-right" src="assets/lotus-flowers.png" alt="Pink lotus flowers" />
        <img class="layer couple" src="assets/couple.png" alt="Kerala wedding couple" />

        <div class="title-card">
          <p class="eyebrow">Save the Date</p>
          <h1>Ajmal & Bride</h1>
          <p class="subcopy">A Kerala wedding celebration framed with temple art, kasavu gold, jasmine, lotus and graceful parallax motion.</p>
        </div>

        <div class="scroll-hint">Scroll</div>
      </div>
    </section>

    <section class="details-section">
      <p class="eyebrow">Wedding Celebration</p>
      <h2>With love, tradition and blessings</h2>
      <div class="details-grid">
        <article>
          <span>Date</span>
          <strong>Coming Soon</strong>
        </article>
        <article>
          <span>Venue</span>
          <strong>Kerala</strong>
        </article>
        <article>
          <span>Theme</span>
          <strong>Kasavu Gold</strong>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
